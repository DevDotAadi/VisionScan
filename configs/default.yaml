# ─────────────────────────────────────────────
# VisionScan — Training Configuration
# ─────────────────────────────────────────────
# Edit this file to change hyperparameters, model architecture, or data paths.
# Then run: python train.py --config configs/default.yaml

# Data
data_dir: "data"
img_size: 224
batch_size: 32

# Model
model_name: "mobilenetv2"          # Options: mobilenetv2, efficientnetv2, convnext
dropout: 0.4
dense_units: 128
unfreeze_layers: 30                # Number of backbone layers to unfreeze in Phase 2

# Training — Phase 1 (frozen backbone)
phase1_epochs: 15
phase1_lr: 1.0e-4

# Training — Phase 2 (fine-tuning)
phase2_epochs: 30
phase2_lr: 1.0e-5

# Loss
loss: "focal"                      # Options: binary_crossentropy, focal
focal_alpha: 0.25
focal_gamma: 2.0
use_class_weights: true

# Callbacks
early_stopping_patience: 8
reduce_lr_patience: 4
reduce_lr_factor: 0.5
min_lr: 1.0e-7

# Mixed Precision
use_mixed_precision: false         # Set true for GPU training with float16

# Output
model_path: "models/visionscan_mobilenet.h5"
results_dir: "results"

# Augmentation
augmentation:
  rotation_range: 30
  width_shift_range: 0.15
  height_shift_range: 0.15
  shear_range: 0.15
  zoom_range: 0.25
  brightness_range: [0.8, 1.2]
  horizontal_flip: true
  vertical_flip: true
  fill_mode: "reflect"
