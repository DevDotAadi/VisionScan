# ==============================================================================
# VisionScan Global — Continuous Security & Vulnerability Scanning Workflow
# ==============================================================================

name: Security & Audit Scan

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    name: Dependency Audit & Unit Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Dependency Vulnerability Audit
        run: |
          pip install pip-audit
          # Audit dependencies for known vulnerabilities, ignoring dev tools if non-critical
          pip-audit --desc on

      - name: Run Test Suite
        run: |
          python -m pytest tests/ -v
